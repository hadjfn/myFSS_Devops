name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: '17'
  JAVA_DISTRIB: temurin

jobs:

  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate Docker Compose
        run: docker compose config -q

  build:
    name: Build — ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        service: [apprenti-service, stats-service]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: ${{ env.JAVA_DISTRIB }}
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Compile source code
        working-directory: ${{ matrix.service }}
        run: mvn -B compile -DskipTests

  test:
    name: Test — ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: build
    strategy:
      fail-fast: false
      matrix:
        service: [apprenti-service, stats-service]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: ${{ env.JAVA_DISTRIB }}
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Run unit tests
        working-directory: ${{ matrix.service }}
        run: mvn -B test

      - name: Generate coverage report
        working-directory: ${{ matrix.service }}
        run: mvn -B jacoco:report

      - name: Publish coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.service }}
          path: ${{ matrix.service }}/target/site/jacoco/

      - name: Publish test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-${{ matrix.service }}
          path: ${{ matrix.service }}/target/surefire-reports/

  quality:
    name: Quality — ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: build
    strategy:
      fail-fast: false
      matrix:
        service: [apprenti-service, stats-service]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: ${{ env.JAVA_DISTRIB }}
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Run SpotBugs analysis
        working-directory: ${{ matrix.service }}
        run: mvn -B verify -DskipTests

      - name: Publish SpotBugs report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: spotbugs-${{ matrix.service }}
          path: |
            ${{ matrix.service }}/target/spotbugs.html
            ${{ matrix.service }}/target/spotbugsXml.xml

  docker:
    name: Docker — ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: [test, quality]
    strategy:
      fail-fast: false
      matrix:
        service: [apprenti-service, stats-service]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.service }}
          push: false
          tags: ${{ matrix.service }}:ci
          
